<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Корпоративное обучение</title>
<style>
:root{--ink:#1c1b19;--paper:#fff;--panel:#f5f3ee;--line:#d3cfc5;--soft:#807a6e;
--accent:#ffd23f;--accent-soft:#fff3c4;--ok:#2e7d5b;--ok-bg:#e3f1ea;--bad:#c8463f;--bad-bg:#fae9e7;}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:var(--ink);background:#eceae3;line-height:1.45;padding:26px 18px 60px;}
.wrap{max-width:1180px;margin:0 auto}
header{margin-bottom:18px}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);font-weight:700}
h1{font-size:27px;margin:.12em 0 0;letter-spacing:-.01em}
.layout{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(0,1fr);gap:26px;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr}}
.board{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;overflow:auto}
.cg{display:grid;gap:0;width:max-content;margin:0 auto}
.cell{position:relative;border:1px solid #c4c0b6;background:#fff;padding:0}
.cell.void{border:none;background:transparent}
.cell .num{position:absolute;top:1px;left:2px;font-size:9px;font-weight:700;color:var(--soft);pointer-events:none;z-index:2}
.cell input{width:100%;height:100%;border:none;background:transparent;text-align:center;
font-weight:700;text-transform:uppercase;color:var(--ink);padding:0;font-family:inherit;}
.cell input:focus{outline:none}
.cell.active{background:var(--accent-soft)}
.cell.cursor{background:var(--accent)}
.cell.ok{background:var(--ok-bg)}.cell.ok input{color:var(--ok)}
.cell.bad{background:var(--bad-bg)}.cell.bad input{color:var(--bad)}
.side{display:flex;flex-direction:column;gap:16px}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px}
.panel h2{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--soft);margin:0 0 10px}
.clues{list-style:none;margin:0;padding:0}
.clues li{display:flex;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:14px;align-items:baseline}
.clues li:hover{background:var(--panel)}
.clues li.sel{background:var(--accent-soft)}
.clues li.done{color:var(--soft)}
.clues li.done .n{color:var(--soft)}
.clues .n{font-weight:700;min-width:20px;font-variant-numeric:tabular-nums}
.clues .len{color:var(--soft);font-weight:600}
.bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
button{font-family:inherit}
.btn{border:none;border-radius:8px;padding:11px 16px;font-weight:700;font-size:14px;cursor:pointer}
.btn.dark{background:var(--ink);color:#fff}.btn.dark:hover{background:#000}
.btn.line{background:#fff;border:1px solid var(--line);color:var(--ink)}.btn.line:hover{border-color:var(--ink)}
.status{margin-left:auto;align-self:center;font-size:14px;font-weight:600;color:var(--soft)}
.status.win{color:var(--ok)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;font-size:15px;
transition:.25s;pointer-events:none;z-index:50;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
@media (prefers-reduced-motion:reduce){.toast{transition:none}}
</style></head><body>
<div class="wrap">
<header><div class="eyebrow">Кроссворд</div><h1>Корпоративное обучение</h1></header>
<div class="bar">
<button class="btn dark" id="checkWord">Проверить слово</button>
<button class="btn line" id="checkAll">Проверить всё</button>
<button class="btn line" id="clear">Очистить</button>
<span class="status" id="status"></span>
</div>
<div class="layout">
<div class="board"><div class="cg" id="grid"></div></div>
<div class="side">
<div class="panel"><h2>По горизонтали</h2><ul class="clues" id="across"></ul></div>
<div class="panel"><h2>По вертикали</h2><ul class="clues" id="down"></ul></div>
</div></div></div>
<div class="toast" id="toast"></div>
<script>
window.__CW__={"title":"Корпоративное обучение","rows":15,"cols":17,"words":[{"number":8,"dir":"across","row":8,"col":4,"len":13,"clue":"Состояние, которое измеряют опросами сразу после обязательного корпоративного мероприятия.","a":"0JLQntCS0JvQldCn0JXQndCd0J7QodCi0Kw="},{"number":4,"dir":"down","row":4,"col":7,"len":11,"clue":"Искусство провести встречу так, чтобы все высказались, а решение всё равно приняли заранее.","a":"0KTQkNCh0JjQm9CY0KLQkNCm0JjQrw=="},{"number":2,"dir":"down","row":0,"col":11,"len":10,"clue":"День, когда коллег заставляют веселиться по расписанию ради укрепления командного духа","a":"0KLQmNCc0JHQmNCb0JTQmNCd0JM="},{"number":3,"dir":"down","row":3,"col":14,"len":8,"clue":"Новое название старой привычки думать, что завтра вы точно начнёте жить эффективнее.","a":"0JzQkNCZ0J3QlNCh0JXQog=="},{"number":6,"dir":"down","row":5,"col":4,"len":10,"clue":"Обмен визитками и обещаниями «обязательно созвониться» без малейшего намерения это делать.","a":"0J3QldCi0JLQntCg0JrQmNCd0JM="},{"number":10,"dir":"across","row":13,"col":6,"len":8,"clue":"Магическое слово, которым объясняют, почему трое делают работу одного, но все очень заняты.","a":"0KHQmNCd0JXQoNCT0JjQrw=="},{"number":5,"dir":"across","row":4,"col":11,"len":6,"clue":"Мысль, которая становится гениальной сразу после того, как её озвучил бизнес-тренер.","a":"0JjQndCh0JDQmdCi"},{"number":7,"dir":"down","row":5,"col":9,"len":4,"clue":"Человек, который задаёт вопросы так долго, пока вы сами не придумаете очевидный ответ.","a":"0JrQntCj0Kc="},{"number":9,"dir":"across","row":10,"col":0,"len":6,"clue":"Универсальное слово для людей, времени, денег и терпения, которого всегда не хватает.","a":"0KDQldCh0KPQoNCh"},{"number":1,"dir":"across","row":0,"col":4,"len":8,"clue":"Бумажный памятник идеям, которые останутся жить только до конца тренинга.","a":"0KTQm9CY0J/Qp9CQ0KDQog=="}]};
(function(){
var DATA=window.__CW__;
function dec(s){return decodeURIComponent(escape(atob(s)));}
var words=DATA.words.map(function(w,i){var o={};for(var k in w)o[k]=w[k];o.wid=i;o.answer=dec(w.a);return o;});
var cells={};
function ck(r,c){return r+","+c;}
words.forEach(function(w){for(var i=0;i<w.len;i++){
  var r=w.row+(w.dir==="down"?i:0),c=w.col+(w.dir==="across"?i:0),k=ck(r,c);
  if(!cells[k])cells[k]={r:r,c:c,words:[],num:null,input:null,el:null};
  cells[k].words.push({wid:w.wid,idx:i});
}});
words.forEach(function(w){var k=ck(w.row,w.col);if(cells[k].num==null)cells[k].num=w.number;});
var gridEl=document.getElementById("grid");
function sizeCells(){
  var board=gridEl.parentElement;var avail=board.clientWidth-2;
  var size=Math.floor(avail/DATA.cols);size=Math.max(20,Math.min(40,size));
  gridEl.style.gridTemplateColumns="repeat("+DATA.cols+","+size+"px)";
  var inputs=gridEl.querySelectorAll(".cell");
  for(var i=0;i<inputs.length;i++){inputs[i].style.height=size+"px";}
  gridEl.querySelectorAll(".cell input").forEach(function(inp){inp.style.fontSize=Math.round(size*0.5)+"px";});
}
for(var r=0;r<DATA.rows;r++){for(var c=0;c<DATA.cols;c++){
  var k=ck(r,c);var d=document.createElement("div");
  if(cells[k]){d.className="cell";
    if(cells[k].num){var ns=document.createElement("span");ns.className="num";ns.textContent=cells[k].num;d.appendChild(ns);}
    var inp=document.createElement("input");inp.maxLength=1;inp.setAttribute("inputmode","text");
    inp.dataset.k=k;d.appendChild(inp);cells[k].input=inp;cells[k].el=d;
  }else{d.className="cell void";}
  gridEl.appendChild(d);
}}
var activeWid=null,activeIdx=0;
function wordCells(wid){var w=words[wid];var out=[];for(var i=0;i<w.len;i++){
  var r=w.row+(w.dir==="down"?i:0),c=w.col+(w.dir==="across"?i:0);out.push(cells[ck(r,c)]);}return out;}
function clearCls(cls){gridEl.querySelectorAll(".cell."+cls).forEach(function(e){e.classList.remove(cls);});}
function highlight(){clearCls("active");clearCls("cursor");
  document.querySelectorAll(".clues li").forEach(function(li){li.classList.remove("sel");});
  if(activeWid==null)return;
  wordCells(activeWid).forEach(function(cl,i){if(cl.el){cl.el.classList.add("active");if(i===activeIdx)cl.el.classList.add("cursor");}});
  var li=liByWid[activeWid];if(li)li.classList.add("sel");
}
function setActive(wid,idx){activeWid=wid;activeIdx=idx||0;highlight();var cl=wordCells(wid)[activeIdx];if(cl&&cl.input)cl.input.focus();}
function firstEmptyIdx(wid){var cs=wordCells(wid);for(var i=0;i<cs.length;i++)if(!cs[i].input.value)return i;return 0;}
gridEl.addEventListener("focusin",function(e){if(e.target.tagName!=="INPUT")return;
  var cell=cells[e.target.dataset.k];var chosen=null;
  for(var i=0;i<cell.words.length;i++)if(cell.words[i].wid===activeWid){chosen=cell.words[i];break;}
  if(!chosen)chosen=cell.words[0];activeWid=chosen.wid;activeIdx=chosen.idx;highlight();});
gridEl.addEventListener("click",function(e){if(e.target.tagName!=="INPUT")return;
  var cell=cells[e.target.dataset.k];
  if(cell.words.length>1){var cur=null;for(var i=0;i<cell.words.length;i++)if(cell.words[i].wid===activeWid)cur=i;
    if(cur!==null){var nxt=cell.words[(cur+1)%cell.words.length];activeWid=nxt.wid;activeIdx=nxt.idx;highlight();}}});
gridEl.addEventListener("input",function(e){var inp=e.target;if(inp.tagName!=="INPUT")return;
  var v=inp.value.toUpperCase().replace(/Ё/g,"Е");var m=v.match(/[А-Я]/g);
  inp.value=m?m[m.length-1]:"";
  var cell=cells[inp.dataset.k];if(cell.el){cell.el.classList.remove("ok");cell.el.classList.remove("bad");}
  if(inp.value)moveNext();});
function moveNext(){if(activeWid==null)return;var cs=wordCells(activeWid);
  if(activeIdx<cs.length-1){activeIdx++;highlight();cs[activeIdx].input.focus();}}
function movePrev(){if(activeWid==null)return;var cs=wordCells(activeWid);
  if(activeIdx>0){activeIdx--;highlight();cs[activeIdx].input.focus();}}
gridEl.addEventListener("keydown",function(e){var inp=e.target;if(inp.tagName!=="INPUT")return;
  if(e.key==="Backspace"&&!inp.value){e.preventDefault();movePrev();var cs=wordCells(activeWid);if(cs[activeIdx])cs[activeIdx].input.value="";}
  else if(e.key==="ArrowRight"||e.key==="ArrowDown"){e.preventDefault();moveNext();}
  else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();movePrev();}
  else if(e.key==="Enter"){e.preventDefault();checkWord();}});
var liByWid={};
function buildClues(dir,el){var list=words.filter(function(w){return w.dir===dir;}).sort(function(a,b){return a.number-b.number;});
  list.forEach(function(w){var li=document.createElement("li");li.dataset.wid=w.wid;
    var ns=document.createElement("span");ns.className="n";ns.textContent=w.number+".";
    var ts=document.createElement("span");ts.appendChild(document.createTextNode(w.clue+" "));
    var ls=document.createElement("span");ls.className="len";ls.textContent="("+w.len+")";ts.appendChild(ls);
    li.appendChild(ns);li.appendChild(ts);
    li.onclick=function(){setActive(w.wid,firstEmptyIdx(w.wid));};el.appendChild(li);liByWid[w.wid]=li;});}
buildClues("across",document.getElementById("across"));
buildClues("down",document.getElementById("down"));
var toastT=null;
function toast(msg,cls){var t=document.getElementById("toast");t.textContent=msg;t.className="toast show "+(cls||"");
  clearTimeout(toastT);toastT=setTimeout(function(){t.className="toast "+(cls||"");},2200);}
function markWord(wid){var w=words[wid];var cs=wordCells(wid);var ok=true;
  for(var i=0;i<cs.length;i++){var val=(cs[i].input.value||"").toUpperCase().replace(/Ё/g,"Е");
    if(val!==w.answer[i])ok=false;}
  cs.forEach(function(cl){if(cl.el){cl.el.classList.remove("ok");cl.el.classList.remove("bad");cl.el.classList.add(ok?"ok":"bad");}});
  var li=liByWid[wid];if(li){li.classList.remove("done");if(ok)li.classList.add("done");}
  return ok;}
function checkWord(){if(activeWid==null){toast("Сначала выберите слово","");return;}
  var ok=markWord(activeWid);toast(ok?"Верно":"Пока неверно",ok?"ok":"bad");}
function checkAll(){var all=true,filledAny=false;
  words.forEach(function(w){var cs=wordCells(w.wid);var filled=cs.every(function(c){return c.input.value;});
    if(filled)filledAny=true;var ok=markWord(w.wid);if(!ok)all=false;});
  var st=document.getElementById("status");
  if(all){st.textContent="Кроссворд решён";st.classList.add("win");toast("Поздравляем! Всё верно","ok");}
  else{st.textContent="";st.classList.remove("win");toast(filledAny?"Есть ошибки — проверьте красные слова":"Заполните клетки","bad");}}
function clearAll(){gridEl.querySelectorAll(".cell input").forEach(function(i){i.value="";});
  clearCls("ok");clearCls("bad");document.querySelectorAll(".clues li").forEach(function(l){l.classList.remove("done");});
  document.getElementById("status").textContent="";document.getElementById("status").classList.remove("win");}
document.getElementById("checkWord").onclick=checkWord;
document.getElementById("checkAll").onclick=checkAll;
document.getElementById("clear").onclick=clearAll;
sizeCells();window.addEventListener("resize",sizeCells);
})();
</script></body></html>
